name: discontinuity2d
channels:
  - pytorch
  - nvidia
  - defaults
  - conda-forge
dependencies:
  - python=3.8
  - pip=23.2.1
  - numpy
  - pytorch=2.0.1
  - pytorch-cuda=11.8
  - torchvision
  - pytorch-lightning
  - matplotlib
  - intel-openmp
  - pip:
    - protobuf
    - libigl==2.5.1
    - gpytoolbox
    - scipy
    - svgpathtools
    - svgwrite
    - opencv-python
    - opencv-contrib-python
    - largesteps
    - meshio
    - imageio
    - pybind11
    - pyquaternion
    - tqdm
